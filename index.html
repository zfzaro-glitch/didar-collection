<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didar Collection | دیدار کۆلێکشن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0a0e14;
            --accent-cyan: #0dc75e;
            --whatsapp-green: #25D366;
            --insta-pink: #E1306C;
            --facebook-blue: #1877F2;
            --snapchat-yellow: #FFFC00;
            --tiktok-black: #000000;
            --phone-blue: #34b7f1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            /* Blue variable for the shadows */
            --shadow-blue: rgba(0, 120, 255, 0.4); 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            background: radial-gradient(circle at top right, #1a2a3a, #0a0e14);
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px var(--shadow-blue);
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid rgb(2, 80, 116) ;
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 120, 255, 0.6);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0 5px;
            letter-spacing: 0px;
            color: white ;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 14px;
            color: #8899a6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 16px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--shadow-blue);
            filter: brightness(1.1);
        }

        .whatsapp { background-color: var(--whatsapp-green); }
        .phone-call { background-color: var(--phone-blue); }
        .facebook { background-color: var(--facebook-blue); }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .snapchat { background-color: var(--snapchat-yellow); color: #000; border: 1px solid #e6e300; }
        .tiktok { background-color: var(--tiktok-black); border: 1px solid rgba(255,255,255,0.2); }

        .snapchat span, .snapchat i { color: #000 !important; }

        .btn i { font-size: 22px; width: 30px; text-align: center; }
        .btn span { flex-grow: 1; text-align: center; font-size: 16px; margin-right: -30px; }

        /* Location Box Style */
        .location-box {
            background-color: rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 20px 15px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 5px;
        }

        .location-box i {
            color: #ff3366;
            font-size: 24px;
            margin-bottom: 10px;
            display: block;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-area">
            <img src="logo.jpg" alt="Logo" class="logo-img">
        </div>

        <h1>DIDAR COLLECTION</h1>
        <p class="tagline">  سلێمانی - جادەی كۆنی چوارتا - سەروو ئامادەیی پیرەمێرد</p>

        <div class="btn-list">
            
            <a href="https://www.instagram.com/didar__collection?igsh=bXMydmZ5c2YyOWN0" class="btn instagram" target="_blank" rel="noopener">
                <i class="fab fa-instagram"></i>
                <span>ئینستاگرام | INSTAGRAM</span>
            </a>

            <a href="https://www.tiktok.com/@didarcollection?_r=1&_t=ZS-94lapEKKELP" class="btn tiktok" target="_blank" rel="noopener">
                <i class="fab fa-tiktok"></i>
                <span>تیکتۆک | TIKTOK</span>
            </a>

            <a href="https://snapchat.com/t/PcE0IR4v" class="btn snapchat" target="_blank" rel="noopener">
                <i class="fab fa-snapchat-ghost"></i>
                <span>سناپچات | SNAPCHAT</span>
            </a>

            <a href="https://www.facebook.com/share/1EDSt2cnV4/" class="btn facebook" target="_blank" rel="noopener">
                <i class="fab fa-facebook-f"></i>
                <span>فەیسبووک | FACEBOOK</span>
            </a>

            <a href="https://wa.me/9647702498580" class="btn whatsapp" target="_blank" rel="noopener">
                <i class="fab fa-whatsapp"></i>
                <span>واتسئاپ | WHATSAPP</span>
            </a>

            <a href="tel:+9647702498580" class="btn phone-call">
                <i class="fas fa-phone-alt"></i>
                <span>پەیوەندیکردن | CALL ME  </span>
            </a>

           
        <div class="footer">
            POWERED BY SUNFLOWER WEB | 2026
        </div>
    </div>

</body>
</html>
